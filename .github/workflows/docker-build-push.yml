name: Build and Push Docker Image to ECR

on:
  workflow_dispatch:
    inputs:
      task_name:
        description: 'Name of the ECS task (e.g., basic-calculator)'
        required: true
        type: string
      version:
        description: 'Semantic version (e.g., 1.0.0, 1.2.3, 2.0.0-beta.1)'
        required: true
        type: string
      also_tag_latest:
        description: 'Also tag as "latest"'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      task_exists: ${{ steps.check.outputs.task_exists }}
      version_valid: ${{ steps.validate.outputs.version_valid }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if task exists
        id: check
        run: |
          TASK_PATH="iac/live_infra/ecs/tasks/${{ inputs.task_name }}/app"
          if [ -d "$TASK_PATH" ]; then
            echo "task_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Task '${{ inputs.task_name }}' exists at $TASK_PATH"
          else
            echo "task_exists=false" >> $GITHUB_OUTPUT
            echo "❌ Task '${{ inputs.task_name }}' not found at $TASK_PATH"
            exit 1
          fi

      - name: Validate semantic version
        id: validate
        run: |
          VERSION="${{ inputs.version }}"

          # Regex for semantic versioning (semver 2.0.0)
          # Supports: 1.0.0, 1.0.0-alpha, 1.0.0-beta.1, 1.0.0+build.123, etc.
          SEMVER_REGEX='^([0-9]+)\.([0-9]+)\.([0-9]+)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'

          if [[ $VERSION =~ $SEMVER_REGEX ]]; then
            echo "version_valid=true" >> $GITHUB_OUTPUT
            echo "✅ Version '$VERSION' is valid semantic version"
          else
            echo "version_valid=false" >> $GITHUB_OUTPUT
            echo "❌ Version '$VERSION' is not a valid semantic version"
            echo "Examples of valid versions: 1.0.0, 1.2.3, 2.0.0-beta.1, 1.0.0+build.123"
            exit 1
          fi

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: validate-inputs
    if: needs.validate-inputs.outputs.task_exists == 'true' && needs.validate-inputs.outputs.version_valid == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-DockerBuild

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR repository name
        id: ecr-repo
        run: |
          # ECR repository name is typically the same as task name
          REPO_NAME="${{ inputs.task_name }}"
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT

          # Get AWS Account ID and Region from AWS credentials
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ secrets.AWS_REGION }}"

          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "region=$REGION" >> $GITHUB_OUTPUT

          ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
          echo "ecr_registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT

          echo "ECR Registry: $ECR_REGISTRY"
          echo "Repository: $REPO_NAME"

      - name: Check if ECR repository exists
        id: check-repo
        run: |
          REPO_NAME="${{ steps.ecr-repo.outputs.repo_name }}"

          if aws ecr describe-repositories --repository-names "$REPO_NAME" 2>/dev/null; then
            echo "repo_exists=true" >> $GITHUB_OUTPUT
            echo "✅ ECR repository '$REPO_NAME' exists"
          else
            echo "repo_exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  ECR repository '$REPO_NAME' does not exist"
            echo "Creating repository..."

            aws ecr create-repository \
              --repository-name "$REPO_NAME" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE

            echo "✅ Created ECR repository '$REPO_NAME'"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        id: build
        working-directory: iac/live_infra/ecs/tasks/${{ inputs.task_name }}/app
        run: |
          IMAGE_TAG="${{ inputs.version }}"
          ECR_REGISTRY="${{ steps.ecr-repo.outputs.ecr_registry }}"
          REPO_NAME="${{ steps.ecr-repo.outputs.repo_name }}"

          IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$IMAGE_TAG"

          echo "Building image: $IMAGE_URI"

          docker build \
            --tag "$IMAGE_URI" \
            --tag "$REPO_NAME:$IMAGE_TAG" \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg VERSION="${{ inputs.version }}" \
            --build-arg VCS_REF="${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --label "org.opencontainers.image.version=${{ inputs.version }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            .

          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

          # Also tag as latest if requested
          if [ "${{ inputs.also_tag_latest }}" == "true" ]; then
            LATEST_URI="$ECR_REGISTRY/$REPO_NAME:latest"
            docker tag "$IMAGE_URI" "$LATEST_URI"
            echo "latest_uri=$LATEST_URI" >> $GITHUB_OUTPUT
            echo "✅ Also tagged as: $LATEST_URI"
          fi

      - name: Push image to ECR
        id: push
        run: |
          IMAGE_URI="${{ steps.build.outputs.image_uri }}"

          echo "Pushing image: $IMAGE_URI"
          docker push "$IMAGE_URI"

          echo "✅ Successfully pushed: $IMAGE_URI"

          # Push latest tag if it exists
          if [ "${{ inputs.also_tag_latest }}" == "true" ]; then
            LATEST_URI="${{ steps.build.outputs.latest_uri }}"
            echo "Pushing latest tag: $LATEST_URI"
            docker push "$LATEST_URI"
            echo "✅ Successfully pushed: $LATEST_URI"
          fi

      - name: Get image digest
        id: digest
        run: |
          REPO_NAME="${{ steps.ecr-repo.outputs.repo_name }}"
          IMAGE_TAG="${{ inputs.version }}"

          # Get the image digest
          DIGEST=$(aws ecr describe-images \
            --repository-name "$REPO_NAME" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Image digest: $DIGEST"

      - name: Summary
        run: |
          echo "## ✅ Docker Image Build and Push Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Task**: \`${{ inputs.task_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${{ inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image URI**: \`${{ steps.build.outputs.image_uri }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest**: \`${{ steps.digest.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.also_tag_latest }}" == "true" ]; then
            echo "**Latest URI**: \`${{ steps.build.outputs.latest_uri }}\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Update your Terraform \`dev.tfvars\` with the new image version" >> $GITHUB_STEP_SUMMARY
          echo "2. Create a PR to apply the infrastructure changes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`hcl" >> $GITHUB_STEP_SUMMARY
          echo "image_uri = \"${{ steps.build.outputs.image_uri }}\"" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Output image details
        run: |
          echo "✅ Build and push completed successfully!"
          echo ""
          echo "Image Details:"
          echo "  Task Name: ${{ inputs.task_name }}"
          echo "  Version: ${{ inputs.version }}"
          echo "  Image URI: ${{ steps.build.outputs.image_uri }}"
          echo "  Digest: ${{ steps.digest.outputs.digest }}"
          if [ "${{ inputs.also_tag_latest }}" == "true" ]; then
            echo "  Latest URI: ${{ steps.build.outputs.latest_uri }}"
          fi
