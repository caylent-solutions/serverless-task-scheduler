name: Build and Push Docker Image to ECR

on:
  workflow_dispatch:
    inputs:
      task_name:
        description: 'Name of the ECS task (e.g., basic-calculator)'
        required: true
        type: string
      version:
        description: 'Semantic version (e.g., 1.0.0, 1.2.3, 2.0.0-beta.1)'
        required: true
        type: string
      also_tag_latest:
        description: 'Also tag as "latest"'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  TASKS_BASE_DIR: iac/live_infra/ecs/tasks

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    outputs:
      task_exists: ${{ steps.check.outputs.task_exists }}
      version_valid: ${{ steps.validate.outputs.version_valid }}
      task_path: ${{ steps.check.outputs.task_path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if task exists
        id: check
        run: |
          TASK_PATH="${{ env.TASKS_BASE_DIR }}/${{ inputs.task_name }}/app"
          
          echo "Checking for task at: $TASK_PATH"
          
          if [ -d "$TASK_PATH" ]; then
            echo "task_exists=true" >> $GITHUB_OUTPUT
            echo "task_path=$TASK_PATH" >> $GITHUB_OUTPUT
            echo "✅ Task '${{ inputs.task_name }}' exists at $TASK_PATH"
            ls -la "$TASK_PATH"
          else
            echo "task_exists=false" >> $GITHUB_OUTPUT
            echo "❌ Task '${{ inputs.task_name }}' not found at $TASK_PATH"
            echo ""
            echo "Available tasks:"
            ls -la "${{ env.TASKS_BASE_DIR }}" || echo "Tasks directory not found"
            exit 1
          fi

      - name: Validate semantic version
        id: validate
        run: |
          VERSION="${{ inputs.version }}"
          SEMVER_REGEX='^([0-9]+)\.([0-9]+)\.([0-9]+)(-([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'

          if [[ $VERSION =~ $SEMVER_REGEX ]]; then
            echo "version_valid=true" >> $GITHUB_OUTPUT
            echo "✅ Version '$VERSION' is valid semantic version"
          else
            echo "version_valid=false" >> $GITHUB_OUTPUT
            echo "❌ Version '$VERSION' is not a valid semantic version"
            echo "Examples: 1.0.0, 1.2.3, 2.0.0-beta.1, 1.0.0+build.123"
            exit 1
          fi

  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: validate-inputs
    if: needs.validate-inputs.outputs.task_exists == 'true' && needs.validate-inputs.outputs.version_valid == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-DockerBuild

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set ECR variables
        id: ecr-vars
        run: |
          REPO_NAME="${{ inputs.task_name }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ secrets.AWS_REGION }}"
          ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
          
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "ecr_registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          
          echo "ECR Registry: $ECR_REGISTRY"
          echo "Repository: $REPO_NAME"

      - name: Ensure ECR repository exists
        run: |
          REPO_NAME="${{ steps.ecr-vars.outputs.repo_name }}"

          if aws ecr describe-repositories --repository-names "$REPO_NAME" 2>/dev/null; then
            echo "✅ ECR repository '$REPO_NAME' exists"
          else
            echo "⚠️  Creating ECR repository '$REPO_NAME'..."
            aws ecr create-repository \
              --repository-name "$REPO_NAME" \
              --image-scanning-configuration scanOnPush=true \
              --image-tag-mutability MUTABLE
            echo "✅ Repository created"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and tag Docker image
        id: build
        working-directory: ${{ needs.validate-inputs.outputs.task_path }}
        run: |
          ECR_REGISTRY="${{ steps.ecr-vars.outputs.ecr_registry }}"
          REPO_NAME="${{ steps.ecr-vars.outputs.repo_name }}"
          VERSION="${{ inputs.version }}"
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          IMAGE_URI="$ECR_REGISTRY/$REPO_NAME:$VERSION"
          
          echo "Building image: $IMAGE_URI"
          
          docker build \
            --tag "$IMAGE_URI" \
            --build-arg BUILD_DATE="$BUILD_DATE" \
            --build-arg VERSION="$VERSION" \
            --build-arg VCS_REF="${{ github.sha }}" \
            --label "org.opencontainers.image.created=$BUILD_DATE" \
            --label "org.opencontainers.image.version=$VERSION" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.source=${{ github.repositoryUrl }}" \
            .
          
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          
          # Tag as latest if requested
          if [ "${{ inputs.also_tag_latest }}" == "true" ]; then
            LATEST_URI="$ECR_REGISTRY/$REPO_NAME:latest"
            docker tag "$IMAGE_URI" "$LATEST_URI"
            echo "latest_uri=$LATEST_URI" >> $GITHUB_OUTPUT
            echo "✅ Also tagged as: latest"
          fi

      - name: Push images to ECR
        run: |
          IMAGE_URI="${{ steps.build.outputs.image_uri }}"
          
          echo "Pushing: $IMAGE_URI"
          docker push "$IMAGE_URI"
          echo "✅ Pushed version tag"
          
          if [ "${{ inputs.also_tag_latest }}" == "true" ]; then
            LATEST_URI="${{ steps.build.outputs.latest_uri }}"
            echo "Pushing: $LATEST_URI"
            docker push "$LATEST_URI"
            echo "✅ Pushed latest tag"
          fi

      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(aws ecr describe-images \
            --repository-name "${{ steps.ecr-vars.outputs.repo_name }}" \
            --image-ids imageTag="${{ inputs.version }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Image digest: $DIGEST"

      - name: Generate summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## ✅ Docker Image Build and Push Complete
          
          **Task**: \`${{ inputs.task_name }}\`
          **Version**: \`${{ inputs.version }}\`
          **Image URI**: \`${{ steps.build.outputs.image_uri }}\`
          **Digest**: \`${{ steps.digest.outputs.digest }}\`
          EOF
          
          if [ "${{ inputs.also_tag_latest }}" == "true" ]; then
            echo "**Latest URI**: \`${{ steps.build.outputs.latest_uri }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          cat >> $GITHUB_STEP_SUMMARY << EOF
          
          ### Next Steps
          1. Update your Terraform \`dev.tfvars\` with the new image version
          2. Create a PR to apply the infrastructure changes
          
          \`\`\`hcl
          image_uri = "${{ steps.build.outputs.image_uri }}"
          \`\`\`
          EOF