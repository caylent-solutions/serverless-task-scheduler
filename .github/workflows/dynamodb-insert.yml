name: Insert Message to DynamoDB

on:
  workflow_dispatch:
    inputs:
      table_name:
        description: 'DynamoDB table name'
        required: true
        type: string
      json_data:
        description: 'JSON data to insert (must be valid DynamoDB JSON format)'
        required: true
        type: string
      validate_only:
        description: 'Only validate JSON without inserting'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  validate-and-insert:
    name: Insert to DynamoDB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON format
        id: validate
        run: |
          JSON_INPUT='${{ inputs.json_data }}'

          echo "Validating JSON input..."

          # Check if input is valid JSON
          if echo "$JSON_INPUT" | jq empty 2>/dev/null; then
            echo "✅ JSON is valid"
            echo "json_valid=true" >> $GITHUB_OUTPUT
          else
            echo "❌ JSON is invalid"
            echo "json_valid=false" >> $GITHUB_OUTPUT
            echo ""
            echo "Error: The provided JSON is not valid."
            echo "Please check your JSON syntax and try again."
            exit 1
          fi

          # Pretty print the JSON for display
          PRETTY_JSON=$(echo "$JSON_INPUT" | jq .)

          {
            echo "PRETTY_JSON<<EOF"
            echo "$PRETTY_JSON"
            echo "EOF"
          } >> $GITHUB_ENV

          echo ""
          echo "Parsed JSON:"
          echo "$PRETTY_JSON"

      - name: Display validation summary
        if: inputs.validate_only == true
        run: |
          echo "## ✅ JSON Validation Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode**: Validate Only (no insertion)" >> $GITHUB_STEP_SUMMARY
          echo "**Table Name**: \`${{ inputs.table_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validated JSON:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "$PRETTY_JSON" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To actually insert this data, run the workflow again with 'Validate only' unchecked." >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "✅ Validation complete. No data was inserted (validate_only = true)."
          exit 0

      - name: Configure AWS Credentials
        if: inputs.validate_only == false
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-DynamoDBInsert

      - name: Check if table exists
        if: inputs.validate_only == false
        id: check-table
        run: |
          TABLE_NAME="${{ inputs.table_name }}"

          echo "Checking if table '$TABLE_NAME' exists..."

          if aws dynamodb describe-table --table-name "$TABLE_NAME" 2>/dev/null; then
            echo "table_exists=true" >> $GITHUB_OUTPUT
            echo "✅ Table '$TABLE_NAME' exists"

            # Get table info
            TABLE_INFO=$(aws dynamodb describe-table --table-name "$TABLE_NAME")
            ITEM_COUNT=$(echo "$TABLE_INFO" | jq -r '.Table.ItemCount')
            TABLE_STATUS=$(echo "$TABLE_INFO" | jq -r '.Table.TableStatus')
            KEY_SCHEMA=$(echo "$TABLE_INFO" | jq -c '.Table.KeySchema')

            echo "table_status=$TABLE_STATUS" >> $GITHUB_OUTPUT
            echo "item_count=$ITEM_COUNT" >> $GITHUB_OUTPUT
            echo "key_schema=$KEY_SCHEMA" >> $GITHUB_OUTPUT

            echo ""
            echo "Table Info:"
            echo "  Status: $TABLE_STATUS"
            echo "  Item Count: $ITEM_COUNT"
            echo "  Key Schema: $KEY_SCHEMA"
          else
            echo "table_exists=false" >> $GITHUB_OUTPUT
            echo "❌ Table '$TABLE_NAME' does not exist"
            exit 1
          fi

      - name: Convert to DynamoDB JSON format
        if: inputs.validate_only == false
        id: convert
        run: |
          JSON_INPUT='${{ inputs.json_data }}'

          echo "Converting JSON to DynamoDB format..."

          # Check if input is already in DynamoDB JSON format (has type descriptors like "S", "N", "M", etc.)
          if echo "$JSON_INPUT" | jq -e 'to_entries | .[0].value | has("S") or has("N") or has("M") or has("L") or has("BOOL") or has("NULL")' > /dev/null 2>&1; then
            echo "Input is already in DynamoDB JSON format"
            DYNAMODB_JSON="$JSON_INPUT"
          else
            echo "Converting from regular JSON to DynamoDB JSON format..."

            # Use AWS CLI to convert to DynamoDB JSON
            DYNAMODB_JSON=$(echo "$JSON_INPUT" | \
              python3 -c "
          import json
          import sys

          def convert_to_dynamodb(obj):
              if isinstance(obj, dict):
                  return {'M': {k: convert_to_dynamodb(v) for k, v in obj.items()}}
              elif isinstance(obj, list):
                  return {'L': [convert_to_dynamodb(item) for item in obj]}
              elif isinstance(obj, str):
                  return {'S': obj}
              elif isinstance(obj, bool):
                  return {'BOOL': obj}
              elif isinstance(obj, (int, float)):
                  return {'N': str(obj)}
              elif obj is None:
                  return {'NULL': True}
              else:
                  return {'S': str(obj)}

          data = json.load(sys.stdin)
          result = {k: convert_to_dynamodb(v) for k, v in data.items()}
          print(json.dumps(result, indent=2))
          ")
          fi

          {
            echo "DYNAMODB_JSON<<EOF"
            echo "$DYNAMODB_JSON"
            echo "EOF"
          } >> $GITHUB_ENV

          echo ""
          echo "DynamoDB JSON format:"
          echo "$DYNAMODB_JSON" | jq .

      - name: Insert item to DynamoDB
        if: inputs.validate_only == false
        id: insert
        run: |
          TABLE_NAME="${{ inputs.table_name }}"

          echo "Inserting item to table '$TABLE_NAME'..."

          # Create a temporary file with the DynamoDB JSON
          echo "$DYNAMODB_JSON" > /tmp/item.json

          # Insert the item
          aws dynamodb put-item \
            --table-name "$TABLE_NAME" \
            --item file:///tmp/item.json \
            --return-consumed-capacity TOTAL \
            --return-item-collection-metrics SIZE > /tmp/result.json

          RESULT=$(cat /tmp/result.json)

          echo "✅ Item inserted successfully"
          echo ""
          echo "Result:"
          echo "$RESULT" | jq .

          # Extract consumed capacity
          CONSUMED_CAPACITY=$(echo "$RESULT" | jq -r '.ConsumedCapacity.CapacityUnits // "N/A"')
          echo "consumed_capacity=$CONSUMED_CAPACITY" >> $GITHUB_OUTPUT

          # Clean up
          rm /tmp/item.json /tmp/result.json

      - name: Verify insertion
        if: inputs.validate_only == false
        id: verify
        run: |
          TABLE_NAME="${{ inputs.table_name }}"

          echo "Verifying insertion..."

          # Get the key schema to extract the primary key
          KEY_SCHEMA='${{ steps.check-table.outputs.key_schema }}'

          # Extract partition key name
          PARTITION_KEY=$(echo "$KEY_SCHEMA" | jq -r '.[] | select(.KeyType=="HASH") | .AttributeName')

          echo "Partition key: $PARTITION_KEY"

          # Extract partition key value from the original JSON
          PARTITION_VALUE=$(echo '${{ inputs.json_data }}' | jq -r --arg key "$PARTITION_KEY" '.[$key]')

          echo "Looking for item with $PARTITION_KEY = $PARTITION_VALUE"

          # Check if sort key exists
          SORT_KEY=$(echo "$KEY_SCHEMA" | jq -r '.[] | select(.KeyType=="RANGE") | .AttributeName // empty')

          if [ -n "$SORT_KEY" ]; then
            SORT_VALUE=$(echo '${{ inputs.json_data }}' | jq -r --arg key "$SORT_KEY" '.[$key]')
            echo "Sort key: $SORT_KEY = $SORT_VALUE"

            # Get item with both partition and sort key
            aws dynamodb get-item \
              --table-name "$TABLE_NAME" \
              --key "{\"$PARTITION_KEY\":{\"S\":\"$PARTITION_VALUE\"},\"$SORT_KEY\":{\"S\":\"$SORT_VALUE\"}}" \
              --output json > /tmp/verify.json
          else
            # Get item with just partition key
            aws dynamodb get-item \
              --table-name "$TABLE_NAME" \
              --key "{\"$PARTITION_KEY\":{\"S\":\"$PARTITION_VALUE\"}}" \
              --output json > /tmp/verify.json
          fi

          if [ $(cat /tmp/verify.json | jq '.Item | length') -gt 0 ]; then
            echo "✅ Item verified in table"
            echo ""
            echo "Retrieved item:"
            cat /tmp/verify.json | jq '.Item'
          else
            echo "⚠️  Warning: Could not verify item (it may still have been inserted)"
          fi

          rm /tmp/verify.json

      - name: Summary
        if: inputs.validate_only == false
        run: |
          echo "## ✅ DynamoDB Insert Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Table Name**: \`${{ inputs.table_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Table Status**: \`${{ steps.check-table.outputs.table_status }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Previous Item Count**: \`${{ steps.check-table.outputs.item_count }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Consumed Capacity**: \`${{ steps.insert.outputs.consumed_capacity }}\` units" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Inserted Data:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "$PRETTY_JSON" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "✅ Successfully inserted item to DynamoDB table '${{ inputs.table_name }}'"
