name: Terraform Apply on Approval

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  check-approval:
    name: Check for Approval
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'terraform') &&
      contains(github.event.issue.labels.*.name, 'awaiting-approval')
    outputs:
      approved: ${{ steps.check.outputs.approved }}
      rejected: ${{ steps.check.outputs.rejected }}
      tasks: ${{ steps.extract.outputs.tasks }}
    steps:
      - name: Check Comment for Approval/Rejection
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = context.payload.comment.body.trim().toLowerCase();
            const approvalWords = ['yes', 'lgtm', 'approve'];
            const rejectionWords = ['no', 'reject'];

            const approved = approvalWords.includes(comment);
            const rejected = rejectionWords.includes(comment);

            console.log(`Comment: "${comment}"`);
            console.log(`Approved: ${approved}`);
            console.log(`Rejected: ${rejected}`);

            core.setOutput('approved', approved);
            core.setOutput('rejected', rejected);

            return { approved, rejected };

      - name: Extract Tasks from Issue
        id: extract
        if: steps.check.outputs.approved == 'true' || steps.check.outputs.rejected == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const bodyMatch = issue.body.match(/\*\*Tasks to Apply\*\*: (.*)/);

            if (!bodyMatch) {
              core.setFailed('Could not extract tasks from issue body');
              return;
            }

            // Extract task names from the format: `task1`, `task2`, ...
            const tasksStr = bodyMatch[1];
            const tasks = tasksStr.match(/`([^`]+)`/g).map(t => t.replace(/`/g, ''));

            console.log(`Extracted tasks: ${JSON.stringify(tasks)}`);
            core.setOutput('tasks', JSON.stringify(tasks));

            return tasks;

      - name: Update Issue on Rejection
        if: steps.check.outputs.rejected == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ❌ Apply Rejected

              The terraform apply has been **rejected** by @${context.actor}.

              No infrastructure changes will be applied.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['terraform', 'rejected']
            });

  terraform-apply:
    name: Apply for ${{ matrix.task }}
    runs-on: ubuntu-latest
    needs: check-approval
    if: needs.check-approval.outputs.approved == 'true'
    strategy:
      matrix:
        task: ${{ fromJson(needs.check-approval.outputs.tasks) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-TerraformApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.5

      - name: Terraform Init
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: terraform init

      - name: Terraform Apply
        id: apply
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: |
          terraform apply -var-file=dev.tfvars -auto-approve > apply_output.txt 2>&1
          cat apply_output.txt
        continue-on-error: true

      - name: Format Apply Output
        id: format-apply
        if: always()
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: |
          {
            echo "APPLY_OUTPUT<<EOF"
            cat apply_output.txt | tail -n 100
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Comment on Issue with Apply Result
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const task = '${{ matrix.task }}';
            const applyExitCode = '${{ steps.apply.outcome }}';
            const applyOutput = process.env.APPLY_OUTPUT;

            const output = `### Terraform Apply Result: \`${task}\`

            #### Status: ${applyExitCode === 'success' ? ':white_check_mark: Success' : ':x: Failed'}

            <details><summary>Show Apply Output (last 100 lines)</summary>

            \`\`\`terraform
            ${applyOutput}
            \`\`\`

            </details>

            **Applied by**: @${{ github.actor }}
            **Workflow**: [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: output
            });

      - name: Fail if Apply Failed
        if: steps.apply.outcome == 'failure'
        run: exit 1

  close-issue:
    name: Close Issue
    runs-on: ubuntu-latest
    needs: [check-approval, terraform-apply]
    if: always() && needs.check-approval.outputs.approved == 'true'
    steps:
      - name: Close Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const applyResult = '${{ needs.terraform-apply.result }}';

            const labels = applyResult === 'success'
              ? ['terraform', 'applied', 'success']
              : ['terraform', 'apply-failed', 'needs-attention'];

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ${applyResult === 'success' ? '✅' : '❌'} Apply Process Complete

              **Overall Status**: ${applyResult === 'success' ? 'Success' : 'Failed'}

              ${applyResult === 'success'
                ? 'All infrastructure changes have been successfully applied.'
                : 'Some apply operations failed. Please check the individual task results above and the workflow logs.'}

              This issue will now be closed.`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: labels
            });
