name: Terraform Plan on PR

on:
  pull_request:
    paths:
      - 'iac/live_infra/ecs/tasks/**'
    branches:
      - main
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  detect-changes:
    name: Detect Changed Tasks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      tasks: ${{ steps.detect.outputs.tasks }}
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed tasks
        id: detect
        run: |
          # Get changed files in the PR
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # Extract unique task names from changed paths
          TASKS=$(echo "$CHANGED_FILES" | \
            grep "iac/live_infra/ecs/tasks/" | \
            sed 's|iac/live_infra/ecs/tasks/\([^/]*\)/.*|\1|' | \
            sort -u | \
            jq -R -s -c 'split("\n")[:-1]')

          echo "tasks=$TASKS" >> $GITHUB_OUTPUT

          # Create matrix for parallel execution
          if [ "$TASKS" != "[]" ] && [ "$TASKS" != "" ]; then
            echo "matrix={\"task\":$TASKS}" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"task\":[]}" >> $GITHUB_OUTPUT
          fi

          echo "Detected tasks: $TASKS"

  terraform-plan:
    name: Plan for ${{ matrix.task }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.tasks != '[]'
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-TerraformPlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.5

      - name: Terraform Init
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: terraform init

      - name: Terraform Validate
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: |
          terraform plan -var-file=dev.tfvars -out=tfplan -no-color > plan_output.txt 2>&1
          cat plan_output.txt
        continue-on-error: true

      - name: Format Plan Output
        id: format-plan
        if: always()
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: |
          # Create a formatted output for PR comment
          {
            echo "PLAN_OUTPUT<<EOF"
            cat plan_output.txt | head -n 500
            if [ $(cat plan_output.txt | wc -l) -gt 500 ]; then
              echo ""
              echo "... (output truncated, see workflow logs for full output)"
            fi
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const task = '${{ matrix.task }}';
            const planExitCode = '${{ steps.plan.outcome }}';
            const planOutput = process.env.PLAN_OUTPUT;

            const output = `### Terraform Plan: \`${task}\`

            #### Status: ${planExitCode === 'success' ? ':white_check_mark: Success' : ':x: Failed'}

            <details><summary>Show Plan Output</summary>

            \`\`\`terraform
            ${planOutput}
            \`\`\`

            </details>

            **Pusher**: @${{ github.actor }}
            **Action**: ${{ github.event_name }}
            **Working Directory**: \`iac/live_infra/ecs/tasks/${task}/infrastructure\`
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' &&
                     comment.body.includes(`Terraform Plan: \`${task}\``);
            });

            // Update or create comment
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output
              });
            }

      - name: Upload Plan File
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.task }}
          path: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure/tfplan
          retention-days: 5

      - name: Fail if Plan Failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  summary:
    name: Plan Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, terraform-plan]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.tasks != '[]' &&
      needs.detect-changes.outputs.tasks != ''
    steps:
      - name: Summary Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tasks = ${{ needs.detect-changes.outputs.tasks }};
            const planResult = '${{ needs.terraform-plan.result }}';

            const output = `## Terraform Plan Summary

            **Tasks Detected**: ${tasks.length}
            **Overall Status**: ${planResult === 'success' ? ':white_check_mark: All plans succeeded' : ':warning: Some plans failed'}

            **Affected Tasks**:
            ${tasks.map(t => `- \`${t}\``).join('\n')}

            ---

            :information_source: **Next Steps**:
            - Review the individual plan outputs above
            - **Option 1 - Test Before Merging**: Comment \`terraform apply\` to deploy from this PR branch
            - **Option 2 - Standard Flow**: Merge PR and an issue will be created to track the apply process

            ---

            :rocket: **Quick Apply Commands**:
            - \`terraform apply\` - Apply all changed tasks
            - \`terraform apply <task-name>\` - Apply specific task only
            `;

            // Find existing summary comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const summaryComment = comments.find(comment => {
              return comment.user.type === 'Bot' &&
                     comment.body.includes('## Terraform Plan Summary');
            });

            // Update or create comment
            if (summaryComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: summaryComment.id,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output
              });
            }

  # =========================================================
  # Comment-Triggered Apply Jobs
  # =========================================================

  check-apply-command:
    name: Check for Apply Command
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'terraform apply')
    outputs:
      should_apply: ${{ steps.check.outputs.should_apply }}
      specific_task: ${{ steps.check.outputs.specific_task }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      pr_ref: ${{ steps.pr.outputs.pr_ref }}
      tasks: ${{ steps.detect.outputs.tasks }}
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Check comment authorization
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const comment = context.payload.comment.body;
            const author = context.payload.comment.user.login;

            // Check if comment contains "terraform apply"
            const shouldApply = comment.toLowerCase().includes('terraform apply');
            core.setOutput('should_apply', shouldApply);

            if (shouldApply) {
              // Check for specific task name
              const match = comment.match(/terraform apply\s+([a-z0-9-]+)/i);
              if (match) {
                core.setOutput('specific_task', match[1]);
                console.log(`Specific task requested: ${match[1]}`);
              } else {
                core.setOutput('specific_task', '');
                console.log('Apply all changed tasks');
              }

              // Add reaction to comment
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'rocket'
              });
            }

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            core.setOutput('pr_number', context.issue.number);
            core.setOutput('pr_ref', pr.data.head.ref);

            console.log(`PR #${context.issue.number}, ref: ${pr.data.head.ref}`);

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.pr_ref }}
          fetch-depth: 0

      - name: Detect changed tasks
        id: detect
        run: |
          # Get PR base ref
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"

          # Get the base branch
          BASE_REF=$(gh pr view $PR_NUMBER --json baseRefName -q .baseRefName)

          # Get changed files
          CHANGED_FILES=$(git diff --name-only origin/$BASE_REF...HEAD)

          # Extract unique task names
          TASKS=$(echo "$CHANGED_FILES" | \
            grep "iac/live_infra/ecs/tasks/" | \
            sed 's|iac/live_infra/ecs/tasks/\([^/]*\)/.*|\1|' | \
            sort -u | \
            jq -R -s -c 'split("\n")[:-1]')

          # If specific task requested, filter to that task only
          SPECIFIC_TASK="${{ steps.check.outputs.specific_task }}"
          if [ -n "$SPECIFIC_TASK" ]; then
            echo "Filtering to specific task: $SPECIFIC_TASK"
            TASKS=$(echo "$TASKS" | jq --arg task "$SPECIFIC_TASK" '. | map(select(. == $task))')
          fi

          echo "tasks=$TASKS" >> $GITHUB_OUTPUT

          # Create matrix
          if [ "$TASKS" != "[]" ] && [ "$TASKS" != "" ]; then
            echo "matrix={\"task\":$TASKS}" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"task\":[]}" >> $GITHUB_OUTPUT
          fi

          echo "Tasks to apply: $TASKS"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post starting message
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tasks = ${{ steps.detect.outputs.tasks }};
            const specificTask = '${{ steps.check.outputs.specific_task }}';

            let message = '## :rocket: Starting Terraform Apply\n\n';

            if (specificTask) {
              message += `**Task**: \`${specificTask}\`\n`;
            } else {
              message += `**Tasks**: ${tasks.map(t => `\`${t}\``).join(', ')}\n`;
            }

            message += `**Triggered by**: @${{ github.actor }}\n`;
            message += `**PR**: #${{ steps.pr.outputs.pr_number }}\n`;
            message += `**Branch**: \`${{ steps.pr.outputs.pr_ref }}\`\n\n`;
            message += ':hourglass_flowing_sand: Please wait while Terraform applies the changes...';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

  terraform-apply-from-comment:
    name: Apply ${{ matrix.task }}
    runs-on: ubuntu-latest
    needs: check-apply-command
    if: needs.check-apply-command.outputs.should_apply == 'true' && needs.check-apply-command.outputs.tasks != '[]'
    strategy:
      matrix: ${{ fromJson(needs.check-apply-command.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-apply-command.outputs.pr_ref }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-TerraformApplyPR

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ~1.5

      - name: Terraform Init
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: |
          terraform plan -var-file=dev.tfvars -out=tfplan -no-color > plan_output.txt 2>&1 || EXIT_CODE=$?
          cat plan_output.txt

          # Check exit code (0=no changes, 1=error, 2=changes)
          if [ "${EXIT_CODE:-0}" -eq 1 ]; then
            echo "Plan failed"
            exit 1
          elif [ "${EXIT_CODE:-0}" -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Apply
        id: apply
        if: steps.plan.outputs.has_changes == 'true'
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: |
          terraform apply tfplan > apply_output.txt 2>&1
          cat apply_output.txt
        continue-on-error: true

      - name: Format Apply Output
        if: always() && steps.plan.outputs.has_changes == 'true'
        working-directory: iac/live_infra/ecs/tasks/${{ matrix.task }}/infrastructure
        run: |
          {
            echo "APPLY_OUTPUT<<EOF"
            cat apply_output.txt | tail -n 100
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Comment PR with Apply Result
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const task = '${{ matrix.task }}';
            const hasChanges = '${{ steps.plan.outputs.has_changes }}';
            const applyOutcome = '${{ steps.apply.outcome }}';
            const prNumber = '${{ needs.check-apply-command.outputs.pr_number }}';

            let output = `### Terraform Apply Result: \`${task}\`\n\n`;

            if (hasChanges === 'false') {
              output += ':information_source: **No changes** detected - infrastructure is already up to date\n';
            } else if (applyOutcome === 'success') {
              output += ':white_check_mark: **Apply successful**\n\n';
              output += '<details><summary>Show Apply Output (last 100 lines)</summary>\n\n';
              output += '```terraform\n';
              output += process.env.APPLY_OUTPUT;
              output += '\n```\n';
              output += '</details>\n';
            } else {
              output += ':x: **Apply failed**\n\n';
              output += '<details><summary>Show Error Output</summary>\n\n';
              output += '```terraform\n';
              output += process.env.APPLY_OUTPUT;
              output += '\n```\n';
              output += '</details>\n';
            }

            output += `\n**Applied by**: @${{ github.actor }}\n`;
            output += `**Workflow**: [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: output
            });

      - name: Fail if Apply Failed
        if: steps.apply.outcome == 'failure'
        run: exit 1

  apply-summary:
    name: Apply Summary
    runs-on: ubuntu-latest
    needs: [check-apply-command, terraform-apply-from-comment]
    if: always() && needs.check-apply-command.outputs.should_apply == 'true'
    steps:
      - name: Post Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tasks = ${{ needs.check-apply-command.outputs.tasks }};
            const applyResult = '${{ needs.terraform-apply-from-comment.result }}';
            const prNumber = '${{ needs.check-apply-command.outputs.pr_number }}';

            let output = '## :checkered_flag: Terraform Apply Complete\n\n';

            if (applyResult === 'success') {
              output += ':white_check_mark: **All tasks applied successfully**\n\n';
            } else {
              output += ':warning: **Some tasks failed to apply**\n\n';
            }

            output += `**Tasks**: ${tasks.map(t => `\`${t}\``).join(', ')}\n`;
            output += `**Status**: ${applyResult}\n`;
            output += `**Applied by**: @${{ github.actor }}\n\n`;
            output += 'See individual task results above for details.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: output
            });
